name: Build Windows App

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      # 1. 强制 Git 使用 LF 换行符，防止文件 hash 改变导致的 lockfile 校验失败
      - name: Configure Git Line Endings
        run: |
          git config --global core.autocrlf false
          git config --global core.eol lf

      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. 不指定 pnpm 版本，让系统自动读取 package.json 中的 packageManager 字段
      - name: Install pnpm
        uses: pnpm/action-setup@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      # 3. 标准安装，这会严格遵守 pnpm-lock.yaml，不会触发意外的包升级
      - name: Install Dependencies
        run: pnpm install

      # 关键修改：运行 package 命令进行打包，而不是 build
      - name: Package Application
        run: pnpm run package

      - name: Upload Windows Executable
        uses: actions/upload-artifact@v4
        with:
          name: CS-Demo-Manager-Windows
          # electron-builder 通常会将输出放在 release 文件夹
          path: release/*.exe
